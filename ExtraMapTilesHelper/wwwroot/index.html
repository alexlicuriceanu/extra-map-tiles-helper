<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Editor Setup</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Stops the whole page from scrolling */
        }

        /* 1. The Fixed Header */
        #header {
            padding: 20px;
            background: #181825;
            border-bottom: 2px solid #313244;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0; /* Prevents the header from getting squashed */
            z-index: 10;
        }

        h1 {
            margin: 0 0 15px 0;
            font-size: 24px;
        }

        button {
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            background: #89b4fa;
            border: none;
            border-radius: 6px;
            color: #1e1e2e;
            font-weight: bold;
            transition: background 0.2s;
        }

            button:hover {
                background: #74c7ec;
            }

        #status {
            margin: 15px 0 0 0;
            color: #a6e3a1;
            font-size: 14px;
        }

        /* 2. The Scrollable Gallery */
        #textureGallery {
            flex: 1; /* Tells the gallery to fill all remaining vertical space */
            overflow-y: auto; /* Turns on scrolling ONLY for the gallery */
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start; /* Keeps images packed at the top */
            gap: 15px;
        }

        /* Pretty Scrollbars for Desktop */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1e2e;
        }

        ::-webkit-scrollbar-thumb {
            background: #45475a;
            border-radius: 5px;
        }

            ::-webkit-scrollbar-thumb:hover {
                background: #585b70;
            }

        /* 3. Texture Cards */
        .texture-card {
            background: #313244;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 148px;
        }

            .texture-card img {
                width: 128px;
                height: 128px;
                object-fit: contain;
                background: #1e1e2e;
                border-radius: 4px;
            }

            .texture-card small {
                margin-top: 8px;
                font-size: 12px;
                text-align: center;
                word-break: break-all;
            }

        .dict-title {
            width: 100%;
            margin: 10px 0;
            padding-bottom: 5px;
            border-bottom: 1px solid #45475a;
            color: #89b4fa;
        }
    </style>
</head>
<body>

    <div id="header">
        <h1>Map Tile Editor</h1>
        <button id="importBtn">Import .ytd Files</button>
        <p id="status">Waiting for files...</p>
    </div>

    <div id="textureGallery"></div>

    <script src="bridge.js"></script>
    <script>
        const statusEl = document.getElementById("status");
        const galleryEl = document.getElementById("textureGallery");

        document.getElementById("importBtn").addEventListener("click", () => {
        statusEl.innerText = "Opening file picker...";
        Bridge.send("open_file_dialog");
        });

        // 1. Triggered when a new YTD file begins extracting
Bridge.on("ytd_started", (payload) => {
    statusEl.innerText = `Loading dictionary: ${payload.dictionaryName}...`;
    
    // Create a container specifically for this dictionary
    const dictContainer = document.createElement("div");
    dictContainer.id = `dict-${payload.dictionaryName}`; // Give it a unique ID
    dictContainer.style.width = "100%";
    dictContainer.style.display = "flex";
    dictContainer.style.flexWrap = "wrap";
    dictContainer.style.gap = "15px";

    const dictLabel = document.createElement("h3");
    dictLabel.className = "dict-title";
    dictLabel.innerText = `Dictionary: ${payload.dictionaryName}`;
    
    galleryEl.appendChild(dictLabel);
    galleryEl.appendChild(dictContainer);
});

        // 2. Triggered every time a single image finishes converting
        Bridge.on("texture_loaded", (payload) => {
            // Find the container we created for this dictionary
            const targetContainer = document.getElementById(`dict-${payload.dictionaryName}`);
            if (!targetContainer) return;

            // Build the texture card
            const card = document.createElement("div");
            card.className = "texture-card";

            const img = document.createElement("img");
            img.src = payload.texture.preview;

            const label = document.createElement("small");
            label.innerText = payload.texture.name;

            card.appendChild(img);
            card.appendChild(label);
    
            // Append it directly to the UI
            targetContainer.appendChild(card);
        });

        Bridge.on("error", (payload) => {
        statusEl.innerText = `Error: ${payload.message}`;
        statusEl.style.color = "#f38ba8";
        });
    </script>
</body>
</html>
